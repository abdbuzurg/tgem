# Internal nginx config for the frontend container. The host nginx is the
# public ingress and TLS terminator; this server block only serves the SPA.
#
# Scope:
#   - Static files from /usr/share/nginx/html (the Vite `dist/` output).
#   - SPA fallback: every non-asset path returns /index.html so React
#     Router can handle it client-side.
#   - Cache control: hashed assets in /assets/ get 1y immutable;
#     /index.html is no-cache (it's the entrypoint that changes per deploy).
#
# Out of scope:
#   - Does NOT proxy /api/ — the host nginx does that, hitting the backend
#     container on 127.0.0.1:5000.
#   - Does NOT terminate TLS — the host nginx does that.

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Hashed assets emitted by Vite (e.g. /assets/index-a3eadce6.js).
    # Filenames change every build, so they're safe to cache aggressively.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Other static files in the root that *aren't* hashed (favicon, robots,
    # /vite.svg). Short cache; they change rarely but aren't fingerprinted.
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp|woff2?|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback for everything else. React Router handles the rest.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /index.html is the entrypoint — must never be cached, or users on a
    # stale tab will request hashed asset filenames that no longer exist
    # post-deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Silence the noisy default favicon/robots warning if the host nginx
    # doesn't strip those.
    location = /favicon.ico { try_files $uri =204; access_log off; log_not_found off; }
    location = /robots.txt  { try_files $uri =204; access_log off; log_not_found off; }
}
